<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Pembayaran Pesanan</title>
  <style>
    :root{--bg:#f5f7f6;--card:#fff;--text:#17221d;--muted:#68746f;--primary:#00aa13;--primary-dark:#008b10;--soft:#e9f8ec;--border:#e4ebe7;--danger:#e53935;--blue:#1e88e5;--shadow:0 18px 48px rgba(22,40,32,.10)}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--text)}
    button,input,textarea,select{font:inherit} button,a.btn{border:0;border-radius:999px;cursor:pointer;font-weight:850;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 16px} input,textarea{width:100%;border:1px solid var(--border);border-radius:16px;padding:13px 14px;min-height:48px;background:#fff} input:focus,textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 4px rgba(0,170,19,.10)} label{display:block;margin:14px 0 7px;font-size:13px;font-weight:850;color:#304139}.wrap{width:min(980px,calc(100% - 28px));margin:0 auto}.hero{padding:26px 0 90px;color:#fff;background:linear-gradient(135deg,#00aa13,#007f11);border-bottom-left-radius:34px;border-bottom-right-radius:34px;box-shadow:0 18px 45px rgba(0,120,20,.22)}.topbar{display:flex;justify-content:space-between;align-items:center;gap:12px}.back{color:#fff;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.14);padding:10px 14px;border-radius:999px;text-decoration:none;font-weight:850}.hero h1{font-size:clamp(30px,5vw,48px);margin:26px 0 8px;letter-spacing:-.05em;line-height:1}.hero p{margin:0;opacity:.9;line-height:1.55}.grid{margin:-58px auto 60px;display:grid;grid-template-columns:1fr 1fr;gap:18px}.panel{background:#fff;border:1px solid var(--border);border-radius:26px;box-shadow:var(--shadow);overflow:hidden}.panel-head{padding:18px 20px;border-bottom:1px solid var(--border)}.panel-head h2{margin:0;font-size:20px}.panel-body{padding:18px 20px}.pay-card{border:1px solid var(--border);border-radius:22px;padding:16px;margin-bottom:14px;background:#fbfdfb}.pay-card.active{border-color:#b4e7bd;background:#f2fbf4;box-shadow:0 10px 24px rgba(0,170,19,.08)}.pay-title{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:10px}.pay-title b{font-size:17px}.badge{background:var(--soft);color:var(--primary-dark);border-radius:999px;padding:6px 9px;font-size:12px;font-weight:900}.qris-box{height:240px;border:1px dashed #bed5c4;border-radius:18px;background:linear-gradient(135deg,#f4fff6,#fff);display:grid;place-items:center;text-align:center;color:var(--muted);overflow:hidden}.qris-box img{max-width:100%;max-height:100%;object-fit:contain;display:block}.bank-line{display:flex;justify-content:space-between;gap:12px;border-bottom:1px dotted #c9d8cf;padding:9px 0}.bank-line:last-child{border-bottom:0}.summary-line{display:flex;justify-content:space-between;gap:12px;padding:8px 0;border-bottom:1px dotted #d7e2dc}.summary-line.total{font-size:20px;font-weight:950;border-top:1px solid var(--border);border-bottom:0;margin-top:8px;padding-top:14px}.items{margin:0;padding-left:18px;line-height:1.6}.muted{color:var(--muted);font-size:13px;line-height:1.5}.btn-primary{background:var(--primary);color:white;width:100%;box-shadow:0 12px 24px rgba(0,170,19,.22)}.btn-blue{background:var(--blue);color:white}.btn-soft{background:var(--soft);color:var(--primary-dark);border:1px solid #d8f2dc}.preview{display:none;margin-top:12px;border:1px solid var(--border);border-radius:18px;overflow:hidden;background:#fff}.preview img{width:100%;max-height:260px;object-fit:contain;display:block}.notice{padding:12px 14px;border:1px solid #f2d090;background:#fff8e7;color:#704a00;border-radius:18px;font-size:13px;line-height:1.5;margin-top:12px}.success{display:none;padding:13px 15px;margin-top:12px;border-radius:18px;border:1px solid #cfead4;background:#f1fbf3;color:#256834;font-weight:800}.empty{margin:-38px auto 60px;background:#fff;border:1px dashed var(--border);border-radius:24px;padding:24px;text-align:center;color:var(--muted);box-shadow:var(--shadow)}.hidden-frame{display:none}
    @media(max-width:840px){.grid{grid-template-columns:1fr}.hero{border-bottom-left-radius:26px;border-bottom-right-radius:26px}.qris-box{height:220px}}
    @media(max-width:560px){.wrap{width:min(100% - 20px,980px)}.hero{padding-top:18px}.grid{margin-top:-50px}.panel{border-radius:22px}.panel-body{padding:15px}.pay-card{padding:14px}.bank-line,.summary-line{align-items:flex-start}.topbar{align-items:flex-start}.back{font-size:13px}}
  </style>
</head>
<body>
  <header class="hero"><div class="wrap"><div class="topbar"><div><b id="shopNameTop">TUNAS RASA</b><div class="muted" style="color:rgba(255,255,255,.82)">Halaman pembayaran aman</div></div><a class="back" href="index.html">← Kembali ke Menu</a></div><h1>Selesaikan pembayaran</h1><p>Silakan bayar melalui QRIS atau transfer, lalu upload bukti pembayaran. Setelah itu sistem akan membuka chat WhatsApp admin.</p></div></header>
  <main class="wrap" id="content"></main>
  <iframe name="proofFrame" class="hidden-frame" title="proofFrame"></iframe>
  <script>
    const CONFIG={shopName:"TUNAS RASA",whatsapp:"6288211399973",appsScriptUrl:"PASTE_APPS_SCRIPT_WEB_APP_URL_HERE",bankName:"BCA/BRI/Mandiri",accountNumber:"0000000000",accountHolder:"TUNAS RASA",qrisData:""};
    let order=null,settings={};
    const rupiah=n=>new Intl.NumberFormat("id-ID",{style:"currency",currency:"IDR",maximumFractionDigits:0}).format(Number(n||0));
    const esc=text=>String(text??"").replace(/[&<>\"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
    const configured=()=>CONFIG.appsScriptUrl&&!CONFIG.appsScriptUrl.includes("PASTE_APPS_SCRIPT");
    function normalizePhone(phone){const d=String(phone||"").replace(/\D/g,"");if(d.startsWith("0"))return"62"+d.slice(1);if(d.startsWith("62"))return d;return d;}
    function get(k){return settings[k]||CONFIG[k]||""} function shopName(){return get("shopName")||get("shop_name")||CONFIG.shopName} function shopWa(){return normalizePhone(get("whatsapp")||get("whatsapp_admin")||CONFIG.whatsapp)}
    function jsonp(params){return new Promise((resolve,reject)=>{const cb="jsonpCb_"+Date.now()+"_"+Math.floor(Math.random()*9999);let s;window[cb]=data=>{delete window[cb];if(s)s.remove();resolve(data)};try{const url=new URL(CONFIG.appsScriptUrl);Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v));url.searchParams.set("callback",cb);s=document.createElement("script");s.src=url.toString();s.onerror=()=>{delete window[cb];s.remove();reject(new Error("Gagal memuat settings"))};document.body.appendChild(s)}catch(e){delete window[cb];reject(e)}})}
    async function loadSettings(){try{settings={...JSON.parse(localStorage.getItem("tr_payment_settings")||"{}")};if(configured()){const data=await jsonp({action:"getSettings"});if(data.ok&&data.settings)settings={...settings,...data.settings};}}catch{}document.getElementById("shopNameTop").textContent=shopName();}
    function buildWhatsAppMessage(proofText){const itemLines=order.items.map((item,i)=>`${i+1}. ${item.name}\n   ${item.qty} x ${rupiah(item.price)} = ${rupiah(item.price*item.qty)}`).join("\n");return`Halo Admin ${shopName()}, saya sudah melakukan pembayaran.\n\nNo. Pesanan: ${order.orderId}\nNama: ${order.customerName}\nNo. WA: ${order.customerPhone}\nMetode: ${order.deliveryMethod}\nAlamat: ${order.address}\nPembayaran: ${order.paymentMethod}\n\nDetail Pesanan:\n${itemLines}\n\nJumlah Item: ${order.totalQty}\nSubtotal: ${rupiah(order.subtotal)}\nOngkir: ${rupiah(order.ongkir)}\nTotal: ${rupiah(order.total)}\n\nCatatan: ${order.note||"-"}\n\n${proofText}`;}
    function qrisHtml(){const qris=settings.qris_data||settings.qrisData||CONFIG.qrisData;return qris?`<img alt="QRIS" src="${qris}">`:`<div><b>QRIS belum diupload admin</b><br><span class="muted">Admin dapat upload QRIS di menu Pengaturan Admin.</span></div>`}
    function render(){const content=document.getElementById("content");if(!order){content.innerHTML=`<div class="empty"><h2>Belum ada pesanan pembayaran</h2><p>Buat pesanan dari halaman menu terlebih dahulu.</p><a class="btn btn-primary" href="index.html">Buat Pesanan</a></div>`;return;}const pay=order.paymentMethod;content.innerHTML=`<section class="grid"><div class="panel"><div class="panel-head"><h2>Metode Pembayaran</h2></div><div class="panel-body"><div class="pay-card ${pay==='QRIS'?'active':''}"><div class="pay-title"><b>QRIS</b><span class="badge">Scan & bayar</span></div><div class="qris-box">${qrisHtml()}</div><p class="muted">Gunakan aplikasi e-wallet atau mobile banking yang mendukung QRIS.</p></div><div class="pay-card ${pay==='Transfer Bank'?'active':''}"><div class="pay-title"><b>Transfer Bank</b><span class="badge">Manual transfer</span></div><div class="bank-line"><span>Bank</span><b>${esc(settings.bank_name||CONFIG.bankName)}</b></div><div class="bank-line"><span>No. Rekening</span><b>${esc(settings.account_number||CONFIG.accountNumber)}</b></div><div class="bank-line"><span>Atas Nama</span><b>${esc(settings.account_holder||CONFIG.accountHolder)}</b></div><p class="muted">Transfer sesuai total pesanan agar admin mudah mengecek pembayaran.</p></div></div></div><div class="panel"><div class="panel-head"><h2>Upload Bukti Pembayaran</h2></div><div class="panel-body"><div class="summary-line"><span>No Pesanan</span><b>${esc(order.orderId)}</b></div><div class="summary-line"><span>Nama</span><b>${esc(order.customerName)}</b></div><div class="summary-line"><span>Pembayaran</span><b>${esc(order.paymentMethod)}</b></div><ol class="items">${order.items.map(i=>`<li>${esc(i.name)} <b>x${i.qty}</b> — ${rupiah(i.price*i.qty)}</li>`).join("")}</ol><div class="summary-line"><span>Jumlah Item</span><b>${order.totalQty}</b></div><div class="summary-line"><span>Subtotal</span><b>${rupiah(order.subtotal)}</b></div><div class="summary-line"><span>Ongkir</span><b>${rupiah(order.ongkir)}</b></div><div class="summary-line total"><span>Total Bayar</span><span>${rupiah(order.total)}</span></div><form id="proofForm"><label for="proofFile">Upload Bukti Pembayaran</label><input id="proofFile" type="file" accept="image/*" required><div class="preview" id="previewBox"><img id="previewImg" alt="Preview bukti"></div><button class="btn btn-primary" type="submit" style="margin-top:16px">Kirim Bukti & Chat Admin</button></form><div class="success" id="successBox">Bukti berhasil disiapkan. Chat admin akan terbuka.</div><div class="notice">Catatan: tombol ini mengirim notifikasi ke WhatsApp admin. Bila WhatsApp/browser tidak mengizinkan lampiran otomatis, bukti tetap tersimpan ke sistem/admin panel jika Apps Script sudah disambungkan.</div></div></div></section>`;bindProofForm();}
    function compressImage(file,max=1100,quality=.82){return new Promise((resolve,reject)=>{const r=new FileReader();r.onload=()=>{const img=new Image();img.onload=()=>{const scale=Math.min(1,max/img.width,max/img.height);const canvas=document.createElement("canvas");canvas.width=Math.max(1,Math.round(img.width*scale));canvas.height=Math.max(1,Math.round(img.height*scale));const ctx=canvas.getContext("2d");ctx.drawImage(img,0,0,canvas.width,canvas.height);resolve(canvas.toDataURL("image/jpeg",quality));};img.onerror=reject;img.src=r.result};r.onerror=reject;r.readAsDataURL(file)})}
    function submitProofToAppsScript(proofName,proofData){if(!configured())return;const form=document.createElement("form");form.method="POST";form.action=CONFIG.appsScriptUrl;form.target="proofFrame";form.style.display="none";const data={action:"uploadProof",order_id:order.orderId,customer_name:order.customerName,customer_phone:order.customerPhone,payment_method:order.paymentMethod,total:String(order.total),proof_name:proofName,proof_data_url:proofData};Object.entries(data).forEach(([k,v])=>{const input=document.createElement("input");input.name=k;input.value=v;form.appendChild(input)});document.body.appendChild(form);form.submit();setTimeout(()=>form.remove(),1000)}
    function bindProofForm(){const input=document.getElementById("proofFile");input.addEventListener("change",async()=>{const file=input.files[0];if(!file)return;const data=await compressImage(file,900,.8);document.getElementById("previewImg").src=data;document.getElementById("previewBox").style.display="block";input.dataset.preview=data;});document.getElementById("proofForm").addEventListener("submit",async e=>{e.preventDefault();const file=input.files[0];if(!file)return alert("Upload bukti pembayaran terlebih dahulu.");let proofData=input.dataset.preview;if(!proofData)proofData=await compressImage(file,900,.8);submitProofToAppsScript(file.name,proofData);const proofRecord={order_id:order.orderId,proof_name:file.name,proof_data_url:proofData,uploaded_at:new Date().toISOString()};const local=JSON.parse(localStorage.getItem("tr_payment_proofs")||"[]");local.unshift(proofRecord);localStorage.setItem("tr_payment_proofs",JSON.stringify(local.slice(0,80)));document.getElementById("successBox").style.display="block";const proofText="Bukti pembayaran sudah saya upload melalui form. Mohon dicek ya, Admin.";window.open(`https://wa.me/${shopWa()}?text=${encodeURIComponent(buildWhatsAppMessage(proofText))}`,"_blank");});}
    (async function init(){try{order=JSON.parse(localStorage.getItem("pendingPaymentOrder")||"null");}catch{order=null}await loadSettings();render();})();
  </script>
</body>
</html>
